# ===========================
# BASE DE DATOS POSTGRESQL (Render / Supabase)
# ===========================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:juegotrivia}?sslmode=${DB_SSLMODE:disable}}
spring.datasource.username=${DB_USERNAME:${DB_USER:postgres}}
spring.datasource.password=${DB_PASSWORD:${DB_PASS:0000}}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===========================
# JPA / HIBERNATE
# ===========================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ===========================
# SERVIDOR
# ===========================
server.port=${PORT:8080}
server.forward-headers-strategy=framework
